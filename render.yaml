services:
  # ── VK SON WEBSITE (STATIC SITE) ──
  - type: static
    name: vk-son-website
    publishPath: ./

  # ── NEXPROJECTO BACKEND (PYTHON WEB SERVICE) ──
  - type: web
    name: nexprojecto-backend
    runtime: python
    rootDir: project/My Project/backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
